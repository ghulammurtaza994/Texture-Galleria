<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Textures Galleria</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body class="admin-body">

<div id="login-view" class="admin-login">
  <h2>Admin Login</h2>
  <p style="margin-bottom:16px; color:#5a4736; font-size:14px;">Enter the admin passcode to view and manage orders.</p>
  <div class="field">
    <label for="passcode">Passcode</label>
    <input type="password" id="passcode">
  </div>
  <button class="btn btn-primary" id="login-btn" style="width:100%;">Enter</button>
  <p id="login-error" style="color:var(--err); font-size:13px; margin-top:10px; display:none;">Incorrect passcode.</p>
</div>

<div id="dashboard-view" class="admin-wrap" style="display:none;">
  <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
    <h1 style="color:var(--cream); font-size:28px;">Orders — Textures Galleria</h1>
    <button class="btn btn-ghost" id="logout-btn">Log out</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Customer</th>
          <th>Service</th>
          <th>Details</th>
          <th>Status</th>
          <th>Portfolio</th>
        </tr>
      </thead>
      <tbody id="orders-body">
        <tr><td colspan="6">Loading orders…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const STORAGE_KEY = 'tg-admin-key';

  const loginView = document.getElementById('login-view');
  const dashboardView = document.getElementById('dashboard-view');
  const loginBtn = document.getElementById('login-btn');
  const logoutBtn = document.getElementById('logout-btn');
  const passcodeInput = document.getElementById('passcode');
  const loginError = document.getElementById('login-error');
  const ordersBody = document.getElementById('orders-body');

  function getKey() { return sessionStorage.getItem(STORAGE_KEY); }
  function setKey(k) { sessionStorage.setItem(STORAGE_KEY, k); }
  function clearKey() { sessionStorage.removeItem(STORAGE_KEY); }

  async function tryLoad(key) {
    const res = await fetch('/api/orders', { headers: { 'x-admin-key': key } });
    if (res.status === 401) return null;
    return res.json();
  }

  async function showDashboard() {
    loginView.style.display = 'none';
    dashboardView.style.display = 'block';
    const orders = await tryLoad(getKey());
    renderOrders(orders || []);
  }

  function renderOrders(orders) {
    if (!orders.length) {
      ordersBody.innerHTML = '<tr><td colspan="6">No orders yet.</td></tr>';
      return;
    }
    ordersBody.innerHTML = orders.map(o => `
      <tr data-id="${o.id}">
        <td>${new Date(o.createdAt).toLocaleDateString()}</td>
        <td><strong>${escapeHtml(o.name)}</strong><br><span style="font-size:12.5px; color:#5a4736;">${escapeHtml(o.phone)}${o.email ? ' · ' + escapeHtml(o.email) : ''}</span></td>
        <td>${escapeHtml(o.serviceType)}${o.preferredMaterial ? '<br><span style="font-size:12px; color:#5a4736;">' + escapeHtml(o.preferredMaterial) + '</span>' : ''}</td>
        <td style="max-width:260px;">${escapeHtml(o.details)}${o.space ? '<br><span style="font-size:12px; color:#5a4736;">' + escapeHtml(o.space) + '</span>' : ''}</td>
        <td>
          <select class="status-select" data-id="${o.id}">
            ${['New','Approved','In Progress','Completed','Cancelled'].map(s =>
              `<option value="${s}" ${s === o.status ? 'selected' : ''}>${s}</option>`).join('')}
          </select>
        </td>
        <td>
          ${o.status === 'Completed'
            ? `<button class="btn btn-primary publish-btn" data-id="${o.id}" style="padding:8px 14px; font-size:12px;">Publish</button>`
            : '<span style="font-size:12.5px; color:#5a4736;">Mark Completed first</span>'}
        </td>
      </tr>
    `).join('');

    document.querySelectorAll('.status-select').forEach(sel => {
      sel.addEventListener('change', async (e) => {
        const id = e.target.dataset.id;
        await fetch(`/api/orders/${id}/status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-key': getKey() },
          body: JSON.stringify({ status: e.target.value }),
        });
        const orders = await tryLoad(getKey());
        renderOrders(orders || []);
      });
    });

    document.querySelectorAll('.publish-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const id = e.target.dataset.id;
        const order = orders.find(o => o.id === id);
        const title = prompt('Portfolio title:', `${order.serviceType} — ${order.space || 'Lahore'}`);
        if (!title) return;
        const description = prompt('Short description:', order.details.slice(0, 140));
        if (!description) return;
        const material = prompt('Material (wood / velvet / jute / mixed):', order.preferredMaterial || 'mixed');

        await fetch('/api/portfolio', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-key': getKey() },
          body: JSON.stringify({ title, description, material, location: order.space }),
        });
        alert('Published to the public portfolio.');
      });
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  loginBtn.addEventListener('click', async () => {
    const key = passcodeInput.value.trim();
    const orders = await tryLoad(key);
    if (orders === null) {
      loginError.style.display = 'block';
      return;
    }
    setKey(key);
    showDashboard();
  });

  passcodeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loginBtn.click();
  });

  logoutBtn.addEventListener('click', () => {
    clearKey();
    dashboardView.style.display = 'none';
    loginView.style.display = 'block';
  });

  // auto-login if a key is already stored for this session
  if (getKey()) showDashboard();
</script>
</body>
</html>
